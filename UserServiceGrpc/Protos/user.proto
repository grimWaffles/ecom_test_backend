syntax = "proto3";

import "google/protobuf/empty.proto";
option csharp_namespace = "UserServiceGrpc";

service User{
	//Test Functions
	rpc TestService (google.protobuf.Empty) returns (TestResponse); 

	//CRUD Operations
	rpc GetUserByIdAsync (UserRequestSingle) returns (CreateUserRequest);
	rpc GetAllUsersStream (google.protobuf.Empty) returns (stream CreateUserRequest);
	rpc GetAllUsers (google.protobuf.Empty) returns (UserResponseMultiple);
	
	rpc CreateUser(CreateUserRequest) returns (UserCrudResponse);
	rpc UpdateUser(CreateUserRequest) returns (UserCrudResponse);
	rpc DeleteUser(UserRequestSingle) returns (UserCrudResponse);

	//User Authentication
	rpc LoginUser ( UserLoginRequest ) returns (UserLoginResponse);
	rpc LogoutUser ( UserRequestSingle ) returns (UserLoginResponse);

	//Security
	//Role Permissions
	rpc GetRolePermissionByRoleId (GetRolePermissionByRoleIdRequest) returns (RolePermissionResponse);
	rpc GetRolePermissionById (GetRolePermissionByIdRequest) returns (RolePermissionResponse);
	rpc GetRolePermissionByName (GetRolePermissionByNameRequest) returns (RolePermissionResponse);
	rpc CreateRolePermission (CreateUpdateRequest) returns (RolePermissionResponse);
	rpc UpdateRolePermission (CreateUpdateRequest) returns (RolePermissionResponse);
	rpc SoftDeleteRolePermission (SoftDeleteRolePermissionRequest) returns (SoftDeleteResponse);
}

message TestResponse{
	string serviceStatus = 1;
}

message UserRequestSingle{
	int32 id = 1;
	int32 userId = 2;
}

message CreateUserRequest{
	int32 userId = 1;
	string username = 2;
	string password = 3;
	string email = 4;
	string mobileNo = 5;
	int32 roleId = 6;
	int32 isDeleted = 7;
	string roleName = 8;
	int32 id = 9;
}

message UserLoginRequest{
	string username = 1;
	string password = 2;
}

message UserLoginResponse{
	int32 userId = 1;
	string username = 2;
	string accessToken = 3;
	int32 roleId = 4;
	string roleName = 5;
	string errorMessage = 6;
}

message UserCrudResponse{
	int32 status = 1;
	string errorMesage = 2;
}

message UserResponseMultiple{
	repeated CreateUserRequest users = 1;
}

//Security Messages 
//Role Permissions
// Messages
message RolePermissionRequest {
    int64 id = 1;
    int32 role_id = 2;
    int64 permission_id = 3;
    string role_name = 4;
    string permission_name = 5;
}

message RolePermissionResponse {
    int64 id = 1;
    int32 role_id = 2;
    int64 permission_id = 3;
    string role_name = 4;
    string permission_name = 5;
}

message GetRolePermissionByRoleIdRequest {
    int32 role_id = 1;
}

message GetRolePermissionByIdRequest {
    int64 id = 1;
}

message GetRolePermissionByNameRequest {
    string permission_name = 1;
}

message SoftDeleteRolePermissionRequest {
    int64 id = 1;
    int32 user_id = 2;
}

message SoftDeleteResponse {
    bool success = 1;
}

message CreateUpdateRequest {
    RolePermissionRequest role_permission = 1;
    int32 user_id = 2;
}