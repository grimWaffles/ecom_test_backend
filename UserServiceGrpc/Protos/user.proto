syntax = "proto3";

import "google/protobuf/empty.proto";
option csharp_namespace = "UserServiceGrpc";

service User{
	//Test Functions
	rpc TestService (google.protobuf.Empty) returns (TestResponse); 

	//CRUD Operations
	rpc GetUserByIdAsync (UserRequestSingle) returns (CreateUserRequest);
	rpc GetAllUsersStream (google.protobuf.Empty) returns (stream CreateUserRequest);
	rpc GetAllUsers (google.protobuf.Empty) returns (UserResponseMultiple);
	
	rpc CreateUser(CreateUserRequest) returns (UserCrudResponse);
	rpc UpdateUser(CreateUserRequest) returns (UserCrudResponse);
	rpc DeleteUser(UserRequestSingle) returns (UserCrudResponse);

	//User Authentication
	rpc LoginUser ( UserLoginRequest ) returns (UserLoginResponse);
	rpc LogoutUser ( UserRequestSingle ) returns (UserLoginResponse);

	//Role Permissions
	rpc GetAllPermissionsByRoleId (GetAllRolePermissionsByRoleIdRequest) returns (GetAllRolePermissionsByRoleIdResponse);
	rpc GetAllPermissionsByRoleIdAndPermissionName (GetAllRolePermissionsByRoleIdAndPermissionNameRequest) returns (GetAllRolePermissionsByRoleIdResponse);
	rpc CheckRoleIdAndPermission (CheckRoleIdAndPermissionRequest) returns (CheckRoleIdAndPermissionResponse);

    rpc CreateRolePermission (CreateRolePermissionRequest) returns (CreateRolePermissionResponse);
    rpc UpdateRolePermission (UpdateRolePermissionRequest) returns (UpdateRolePermissionResponse);
    rpc DeleteRolePermission (DeleteRolePermissionRequest) returns (DeleteRolePermissionResponse);
}

message TestResponse{
	string serviceStatus = 1;
}

// User Messages
message UserRequestSingle{
	int32 id = 1;
	int32 userId = 2;
}

message CreateUserRequest{
	int32 userId = 1;
	string username = 2;
	string password = 3;
	string email = 4;
	string mobileNo = 5;
	int32 roleId = 6;
	int32 isDeleted = 7;
	string roleName = 8;
	int32 id = 9;
}

message UserLoginRequest{
	string username = 1;
	string password = 2;
}

message UserLoginResponse{
	int32 userId = 1;
	string username = 2;
	string accessToken = 3;
	int32 roleId = 4;
	string roleName = 5;
	string errorMessage = 6;
}

message UserCrudResponse{
	int32 status = 1;
	string errorMesage = 2;
}

message UserResponseMultiple{
	repeated CreateUserRequest users = 1;
}

//Role Permission Messages
message RolePermissionDto {
    int64 id = 1;
    int32 role_id = 2;
    int64 permission_id = 3;
    string role_name = 4;
    string permission_name = 5;
}

message RolePermissionModel {
    int64 id = 1;
    int32 role_id = 2;
    int64 permission_id = 3;
    int32 created_by = 4;
    string created_date = 5;
    string modified_date = 6;
    int32 modified_by = 7;
    bool is_deleted = 8;
}

message GetAllRolePermissionsByRoleIdRequest {
    int64 role_id = 1;
}

message GetAllRolePermissionsByRoleIdAndPermissionNameRequest {
    int64 role_id = 1;
	string permission_name = 2;
}

message CheckRoleIdAndPermissionRequest{
	int64 role_id = 1;
	string permission_name = 2;
}

message CreateRolePermissionRequest {
    RolePermissionModel model = 1;
    int32 user_id = 2;
}

message UpdateRolePermissionRequest {
    RolePermissionModel model = 1;
    int32 user_id = 2;
}

message DeleteRolePermissionRequest {
    int64 id = 1;
    int32 user_id = 2;
}

message GetAllRolePermissionsByRoleIdResponse {
    repeated RolePermissionDto role_permissions = 1;
}

message CreateRolePermissionResponse {
    RolePermissionDto role_permission = 1;
}

message UpdateRolePermissionResponse {
    RolePermissionDto role_permission = 1;
}

message DeleteRolePermissionResponse {
    bool success = 1;
}

message CheckRoleIdAndPermissionResponse {
    bool exists = 1;
}