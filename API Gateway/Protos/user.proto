syntax = "proto3";

import "google/protobuf/empty.proto";
option csharp_namespace = "ApiGateway.Protos";

service User{
	//Test Functions
	rpc TestService (google.protobuf.Empty) returns (TestResponse); 

	//CRUD Operations
	rpc GetUserByIdAsync (UserRequestSingle) returns (CreateUserRequest);
	rpc GetAllUsersStream (google.protobuf.Empty) returns (stream CreateUserRequest);
	rpc GetAllUsers (google.protobuf.Empty) returns (UserResponseMultiple);
	
	rpc CreateUser(CreateUserRequest) returns (UserCrudResponse);
	rpc UpdateUser(CreateUserRequest) returns (UserCrudResponse);
	rpc DeleteUser(UserRequestSingle) returns (UserCrudResponse);

	//User Authentication
	rpc LoginUser ( UserLoginRequest ) returns (UserLoginResponse);
	rpc LogoutUser ( UserRequestSingle ) returns (UserLoginResponse);

	rpc GetRolePermissionById             (GetRolePermissionByIdRequest)             returns (RolePermissionResponse);
	rpc GetAllRolePermissions             (GetAllRolePermissionsRequest)             returns (GetAllRolePermissionsResponse);
	rpc GetRolePermissionsByRoleId        (GetRolePermissionsByRoleIdRequest)        returns (GetAllRolePermissionsResponse);
	rpc GetRolePermissionByRoleIdAndPath  (GetRolePermissionByRoleIdAndPathRequest)  returns (RolePermissionResponse);
	rpc CreateRolePermission              (CreateRolePermissionRequest)              returns (RolePermissionResponse);
	rpc UpdateRolePermission              (UpdateRolePermissionRequest)              returns (RolePermissionResponse);
	rpc DeleteRolePermission              (DeleteRolePermissionRequest)              returns (DeleteRolePermissionResponse);
}

message TestResponse{
	string serviceStatus = 1;
}

message UserRequestSingle{
	int32 id = 1;
	int32 userId = 2;
}

message CreateUserRequest{
	int32 userId = 1;
	string username = 2;
	string password = 3;
	string email = 4;
	string mobileNo = 5;
	int32 roleId = 6;
	int32 isDeleted = 7;
	string roleName = 8;
	int32 id = 9;
}

message UserLoginRequest{
	string username = 1;
	string password = 2;
}

message UserLoginResponse{
	int32 userId = 1;
	string username = 2;
	string accessToken = 3;
	int32 roleId = 4;
	string roleName = 5;
	string errorMessage = 6;
}

message UserCrudResponse{
	int32 status = 1;
	string errorMesage = 2;
}

message UserResponseMultiple{
	repeated CreateUserRequest users = 1;
}

	//User Permissions
	message GetRolePermissionByIdRequest {
		int32 id = 1;
	}

	message GetAllRolePermissionsRequest {
		// intentionally empty — reserved for future pagination fields
	}

	message GetRolePermissionsByRoleIdRequest {
		int32 role_id = 1;
	}

	message GetRolePermissionByRoleIdAndPathRequest {
		int32  role_id  = 1;
		string api_path = 2;
	}

	message CreateRolePermissionRequest {
		int32  role_id           = 1;
		string api_path          = 2;
		bool   view_permission   = 3;
		bool   add_permission    = 4;
		bool   edit_permission   = 5;
		bool   delete_permission = 6;
		int32  created_by        = 7;
	}

	message UpdateRolePermissionRequest {
		int32  id                = 1;
		string api_path          = 2;
		bool   view_permission   = 3;
		bool   add_permission    = 4;
		bool   edit_permission   = 5;
		bool   delete_permission = 6;
		int32  modified_by       = 7;
	}

	message DeleteRolePermissionRequest {
		int32 id = 1;
	}

	// ── Response Messages ────────────────────────────────────────────────────────

	message RolePermissionResponse {
		int32  id                = 1;
		int32  role_id           = 2;
		string role_name         = 3;
		string api_path          = 4;
		bool   view_permission   = 5;
		bool   add_permission    = 6;
		bool   edit_permission   = 7;
		bool   delete_permission = 8;
		int32  created_by        = 9;
		int32  modified_by       = 10;
		string created_date      = 11;
		string modified_date     = 12;
	}

	message GetAllRolePermissionsResponse {
		repeated RolePermissionResponse items = 1;
	}

	message DeleteRolePermissionResponse {
		bool   success = 1;
		string message = 2;
	}
